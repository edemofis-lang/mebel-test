<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор шкафа</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-row { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .result { font-size: 24px; font-weight: bold; color: #e67e22; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Расчет шкафа</h2>
    <div class="input-row">
        <label>Ширина (мм)</label>
        <input type="number" id="w" value="2000" oninput="calc()">
    </div>
    <div class="input-row">
        <label>Кол-во полок</label>
        <input type="number" id="shelves" value="3" oninput="calc()">
    </div>
    <div class="input-row">
        <label>Кол-во ящиков</label>
        <input type="number" id="drawers" value="2" oninput="calc()">
    </div>
    
    <div class="result" id="total">0 руб. ПМР</div>
</div>

<script>
    function calc() {
        let w = document.getElementById('w').value;
        let s = document.getElementById('shelves').value;
        let d = document.getElementById('drawers').value;
        
        // Формула: база + цена полок + цена ящиков
        let price = (w * 2) + (s * 300) + (d * 800);
        document.getElementById('total').innerText = price + " руб. ПМР";
    }
    calc();
</script>
</body>
</html>
