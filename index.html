<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Калькулятор мебели</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}
input{
    width: 100%;
    padding: 10px;
    margin: 5px 0 15px;
}
button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
}
#result{
    margin-top:20px;
    font-size:24px;
    color:green;
}
</style>
</head>
<body>

<h1>Калькулятор шкафа</h1>

<label>Ширина (см)</label>
<input type="number" id="w">

<label>Высота (см)</label>
<input type="number" id="h">

<label>Глубина (см)</label>
<input type="number" id="d">

<button onclick="calc()">Рассчитать стоимость</button>

<div id="result"></div>

<script>
function calc() {
    let w = Number(document.getElementById('w').value);
    let h = Number(document.getElementById('h').value);
    let d = Number(document.getElementById('d').value);

    let price = (w*h*d/1000000)*6000;

    document.getElementById('result').innerHTML =
        'Ориентировочная стоимость: ' +
        Math.round(price) +
        ' леев';
}
</script>

</body>
</html>
