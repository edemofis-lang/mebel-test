<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор шкафа</title>
    <style>
        :root { --main: #e67e22; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: #fff; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .gallery-item { border: 2px solid #ddd; padding: 5px; border-radius: 8px; cursor: pointer; text-align: center; }
        .gallery-item img { width: 100%; height: 80px; object-fit: contain; }
        .gallery-item.active { border-color: var(--main); background: #fff4e6; }
        .price-total { font-size: 24px; font-weight: bold; color: var(--main); text-align: center; margin: 20px 0; }
        button { width: 100%; padding: 15px; background: var(--main); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Шаг 2: Наполнение</h2>
    
    <div class="input-group">
        <label>Ширина (мм)</label>
        <input type="number" id="w" value="2000" onchange="calc()">
    </div>

    <label>Выберите вариант:</label>
    <div class="gallery">
        <div class="gallery-item active" onclick="select(this, 1)">
            <img src="http://googleusercontent.com/image_generation_content/2" alt="Classic">
            <small>Классика</small>
        </div>
        <div class="gallery-item" onclick="select(this, 1.3)">
            <img src="http://googleusercontent.com/image_generation_content/2" alt="Drawers">
            <small>С ящиками</small>
        </div>
    </div>

    <div class="price-total" id="total">0 руб. ПМР</div>
    <button onclick="alert('Заявка отправлена!')">Заказать</button>
</div>

<script>
    let mult = 1;
    function select(el, m) {
        document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        mult = m;
        calc();
    }
    function calc() {
        let w = document.getElementById('w').value;
        let price = Math.round((w * 2.5) * mult);
        document.getElementById('total').innerText = price + " руб. ПМР";
    }
    calc();
</script>
</body>
</html>
