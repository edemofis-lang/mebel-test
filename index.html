<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор шкафа v3</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 30px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #2980b9; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #ebf5fb; border: 1px solid #aed6f1; text-align: center; font-size: 20px; font-weight: bold; color: #21618c; }
    </style>
</head>
<body>

<h2>Расчет стоимости шкафа</h2>

<label>Тип фасада</label>
<select id="pricePerM2">
    <option value="360">ЛДСП (360 руб/м²)</option>
    <option value="750">Зеркало (750 руб/м²)</option>
    <option value="2500">МДФ глянец (2500 руб/м²)</option>
</select>

<label>Ширина (см)</label>
<input type="number" id="w" value="150">

<label>Высота (см)</label>
<input type="number" id="h" value="200">

<label>Глубина (см)</label>
<input type="number" id="d" value="60">

<button onclick="calc()">Рассчитать</button>

<div id="result">Введите параметры</div>

<script>
function calc() {
    let priceM2 = Number(document.getElementById("pricePerM2").value);
    let w = Number(document.getElementById("w").value);
    let h = Number(document.getElementById("h").value);
    let d = Number(document.getElementById("d").value);

    // 1. Площадь фасада в м2
    let area = (w * h) / 10000;
    
    // 2. Коэффициент объема (чем глубже шкаф, тем дороже): 
    // при глубине 60 см d_factor = 1.0, при 40 см будет меньше
    let d_factor = d / 60;
    
    // 3. Формула: (Площадь фасада * цена * 3 (корпус) * d_factor) + наценка (работа)
    let finalPrice = (area * priceM2 * 3 * d_factor) * 1.5;

    document.getElementById("result").innerHTML = 
        "Итого: " + Math.round(finalPrice).toLocaleString() + " руб. ПМР";
}
</script>

</body>
</html>
