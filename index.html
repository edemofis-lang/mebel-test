<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор шкафа</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 30px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        label { display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #d35400; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #fff3e0; border: 1px solid #ffe0b2; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Расчет стоимости шкафа</h2>

<label>Тип фасада</label>
<select id="facadeCost">
    <option value="360">ЛДСП (360 руб/м²)</option>
    <option value="700">Зеркало (700 руб/м²)</option>
    <option value="900">МДФ глянец (900 руб/м²)</option>
</select>

<label>Ширина (см)</label>
<input type="number" id="w" placeholder="например, 200">

<label>Высота (см)</label>
<input type="number" id="h" placeholder="например, 240">

<label>Глубина (см)</label>
<input type="number" id="d" placeholder="например, 60">

<button onclick="calc()">Рассчитать стоимость</button>

<div id="result">Введите параметры</div>

<script>
function calc() {
    let priceM2 = Number(document.getElementById("facadeCost").value);
    let w = Number(document.getElementById("w").value);
    let h = Number(document.getElementById("h").value);
    let d = Number(document.getElementById("d").value);

    // 1. Площадь фасада в м2
    let area = (w * h) / 10000;
    
    // 2. Коэффициент расхода материала (учитываем каркас, полки, перегородки). 
    // Обычно для шкафа это площадь фасада * 3.5
    let totalMaterialArea = area * 3.5;
    
    // 3. Стоимость материала
    let materialTotal = totalMaterialArea * priceM2;
    
    // 4. Добавляем работу и фурнитуру (обычно это еще + 50-70% к стоимости материала)
    let finalPrice = materialTotal * 1.7;

    document.getElementById("result").innerHTML = 
        "Примерная цена: " + Math.round(finalPrice).toLocaleString() + " руб. ПМР";
}
</script>

</body>
</html>
