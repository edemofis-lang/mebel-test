<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор шкафа</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 30px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #d35400; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #fff3e0; border: 1px solid #ffe0b2; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Расчет стоимости шкафа</h2>

<label>Тип фасада</label>
<select id="pricePerM2">
    <option value="360">ЛДСП (360 руб/м²)</option>
    <option value="750">Зеркало (750 руб/м²)</option>
    <option value="2500">МДФ глянец (2500 руб/м²)</option>
</select>

<label>Ширина (см)</label>
<input type="number" id="w" value="150">

<label>Высота (см)</label>
<input type="number" id="h" value="200">

<button onclick="calc()">Рассчитать стоимость</button>

<div id="result">Введите параметры</div>

<script>
function calc() {
    let priceM2 = Number(document.getElementById("pricePerM2").value);
    let w = Number(document.getElementById("w").value);
    let h = Number(document.getElementById("h").value);

    // Площадь в м2
    let area = (w * h) / 10000;
    
    // Формула: (Площадь * цена материала * коэф. расхода) + работа/фурнитура
    // Коэф. 3 учитывает корпус и полки, 1.5 - работа и фурнитура
    let finalPrice = (area * priceM2 * 3) * 1.5;

    document.getElementById("result").innerHTML = 
        "Примерная цена: " + Math.round(finalPrice).toLocaleString() + " руб. ПМР";
}
</script>

</body>
</html>
