<!DOCTYPE html>
<html>
<head>
    <title>3D Конструктор Шкафа</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        #canvas-container { width: 100%; max-width: 600px; height: 400px; background: #eee; }
        .controls { padding: 20px; width: 100%; max-width: 600px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="controls">
    <label>Ширина (мм):</label> <input type="number" id="width" value="1800" onchange="updateScene()">
    <label>Полки:</label> <input type="number" id="shelves" value="3" onchange="updateScene()">
    <label>Ящики:</label> <input type="number" id="drawers" value="2" onchange="updateScene()">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(45, 600/400, 0.1, 3000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(600, 400);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    camera.position.set(2000, 1500, 2000);
    camera.lookAt(0, 0, 0);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1000, 1000, 1000);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Функция отрисовки шкафа
    function updateScene() {
        // Удаляем старый шкаф
        while(scene.children.length > 2){ scene.remove(scene.children[2]); }

        let w = document.getElementById('width').value;
        let s = document.getElementById('shelves').value;
        
        // Рисуем корпус
        const boxGeo = new THREE.BoxGeometry(w, 2300, 600);
        const mat = new THREE.MeshPhongMaterial({color: 0xdeb887, wireframe: false});
        const wardrobe = new THREE.Mesh(boxGeo, mat);
        scene.add(wardrobe);

        renderer.render(scene, camera);
    }

    updateScene();
</script>
</body>
</html>
